# Bundled CI workflow for the reference-delivery example.
#
# The production Forgejo provisioner commits a COMMIT-MESSAGE-MARKER CI workflow
# ("[ci-pass]") that only the deterministic temper-testing fake worker can
# satisfy. This Smith example instead pairs the engineer with a REAL local-git
# coding workspace, whose PR-head commits carry an ordinary message ("Implement
# ..."), not the demo marker. So `run.sh` overrides the provisioned marker
# workflow with this pass-through workflow — it commits this file onto each
# converging repo's default branch before the workers start, so a real product
# diff clears the landing CI gate and the bot can merge.
#
# It runs directly on the host (`runs-on: host`, no containers) because the
# bundled forgejo-runner is registered in host mode, and it needs no checkout.
#
# A REAL project replaces this entire file with its real CI (build, test, lint,
# whatever) and pairs the engineer with a coding agent whose diffs pass it. The
# reviewer approval and the bot's review + CI landing gates remain the
# meaningful gates that converge the workflow.
name: ci
on: [push]
jobs:
  build:
    runs-on: host
    steps:
      - name: reference-delivery demo build
        run: |
          echo "reference-delivery demo CI: validating engineer PR head ${GITHUB_SHA}"
          echo "ok"
