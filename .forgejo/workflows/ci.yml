name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  validate:
    runs-on: host
    env:
      CARGO_BUILD_JOBS: "1"
    defaults:
      run:
        working-directory: ${{ env.HOME }}/.local/state/forgejo/runner/data/smith
    steps:
      - name: Checkout
        run: |
          set -eu

          repo_dir="$HOME/.local/state/forgejo/runner/data/smith"
          repo_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"

          mkdir -p "$(dirname "$repo_dir")"

          if [ -d "$repo_dir/.git" ]; then
            cd "$repo_dir"
            git remote set-url origin "$repo_url"
          else
            git -c http.extraheader="AUTHORIZATION: token $GITHUB_TOKEN" \
              clone --no-checkout "$repo_url" "$repo_dir"
            cd "$repo_dir"
          fi

          git -c http.extraheader="AUTHORIZATION: token $GITHUB_TOKEN" \
            fetch --force --prune origin "$GITHUB_REF"
          git checkout --force --detach FETCH_HEAD
          git reset --hard "$GITHUB_SHA"
          # Keep the local Cargo target symlink and Forgejo fixture binary cache.
          # `target/` does not match a symlink, so exclude `target` without a slash.
          git clean -ffdx -e target -e .cache/forgejo

          mkdir -p "$HOME/.cache/cargo-target-smith"
          if [ -e target ] && [ ! -L target ]; then
            rm -rf target
          fi
          ln -sfn "$HOME/.cache/cargo-target-smith" target
      - name: Lint
        run: |
          set -eu
          cargo fmt --all
          cargo dev-clippy
      - name: Check
        run: |
          set -eu
          cargo dev-check
      - name: Test
        run: |
          set -eu
          cargo dev-test
      # The coding-agent and basic-delivery jig e2e steps moved out with the
      # agent: the coding-agent loop ⇄ jig test now lives in the `anvil` repo
      # (its own CI), and the basic-delivery topology e2e must be re-pointed at
      # the `anvil-agent` binary as part of the examples/deploy sweep tracked in
      # smith/agent-process-split.md (§Examples/deploy follow-up). Until that
      # lands, smith CI gates on the hermetic out-of-process worker e2e in
      # `cargo dev-test` (tests/coding_worker_e2e.rs), which drives the full
      # orchestration path against a deterministic protocol-speaking agent.
