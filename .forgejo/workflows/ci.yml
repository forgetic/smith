name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  check:
    runs-on: host
    steps:
      - name: checkout (manual; OFFLINE_MODE has no actions/checkout)
        run: |
          set -eu
          rm -rf "$GITHUB_WORKSPACE/repo"
          mkdir -p "$GITHUB_WORKSPACE/repo"
          cd "$GITHUB_WORKSPACE/repo"
          git init -q
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraheader="AUTHORIZATION: token $GITHUB_TOKEN" \
            fetch --depth=1 origin "$GITHUB_SHA"
          git checkout -q --detach FETCH_HEAD

      - name: cargo fmt --check
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE/repo"
          cargo fmt --all --check

      - name: cargo clippy
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE/repo"
          # Warm, shared target cache across CI runs (the checkout dir is wiped
          # each run); keep it outside the throwaway workspace.
          export CARGO_TARGET_DIR="$HOME/.cache/smith-ci/target"
          cargo dev-clippy -- -D warnings

      - name: cargo test
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE/repo"
          export CARGO_TARGET_DIR="$HOME/.cache/smith-ci/target"
          cargo dev-test
