name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  check:
    runs-on: host
    defaults:
      run:
        working-directory: ${{ env.HOME }}/.local/state/forgejo/runner/data/smith
    steps:
      - name: Checkout
        # Run from $HOME, not the job-default working-directory: on the first
        # ever run the repo dir does not exist yet, and the runner cd's into
        # working-directory before the step — which would fail here. This step
        # is what creates it.
        working-directory: ${{ env.HOME }}
        run: |
          set -eu

          repo_dir="$HOME/.local/state/forgejo/runner/data/smith
          repo_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"

          mkdir -p "$(dirname "$repo_dir")"

          if [ -d "$repo_dir/.git" ]; then
            cd "$repo_dir"
            git remote set-url origin "$repo_url"
          else
            rm -rf "$repo_dir"
            git -c http.extraheader="AUTHORIZATION: token $GITHUB_TOKEN" \
              clone --no-checkout "$repo_url" "$repo_dir"
            cd "$repo_dir"
          fi

          git -c http.extraheader="AUTHORIZATION: token $GITHUB_TOKEN" \
            fetch --force --prune origin "$GITHUB_REF"
          git checkout --force --detach FETCH_HEAD
          git reset --hard "$GITHUB_SHA"
          # Keep the shared Cargo target symlink. `target/` does not match a
          # symlink, so exclude `target` without a trailing slash.
          git clean -ffdx -e target

          mkdir -p "$HOME/.cache/cargo-target-smith
          if [ -e target ] && [ ! -L target ]; then
            rm -rf target
          fi
          ln -sfn "$HOME/.cache/cargo-target-smith target

      - name: cargo fmt --check
        run: |
          set -eu
          cargo fmt --all --check

      - name: cargo clippy
        run: |
          set -eu
          cargo dev-clippy -- -D warnings

      - name: cargo test
        run: |
          set -eu
          cargo dev-test
