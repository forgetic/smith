[workspace]
members = [
    "crates/smith-temper-agent",
    "crates/smith-temper-agent-cli",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
version = "0.1.0"

[workspace.dependencies]
async-trait = "0.1"
# Pinned to the exact version `pi_agent_rust 0.1.13` pulls in; the coding-agent
# binary drives the pi file/bash tools on an asupersync reactor.
asupersync = "=0.3.1"
pi_agent_rust = "0.1.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1"
uuid = { version = "1", features = ["v4"] }

[workspace.lints.rust]
unsafe_code = "forbid"

[profile.dev]
opt-level = 0
debug = 0
incremental = true
codegen-units = 256
lto = false

[profile.dev.package."*"]
debug = 0

[profile.test]
opt-level = 0
debug = 0
incremental = true
codegen-units = 256
lto = false

# `pi_agent_rust 0.1.13` pulls `asupersync =0.3.1`, which only builds with the
# API-compatible `franken-decision 0.3.1`. Keep Cargo.lock pinned with:
#
#   cargo update -p franken-decision --precise 0.3.1
#
# Re-check this workaround before bumping `pi_agent_rust`.
